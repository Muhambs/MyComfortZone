{% extends 'users/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block content %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <div class="container" style="margin-top: 30px;">
    <form action="" method="POST">
      {% csrf_token %}
    <label><strong>Username:</strong></label></br>
    <input type = "text" placeholder = " Enter your username" name = "username" required ></br>
    <label><strong>Password :</strong></label></br>
    <input type = "password" placeholder = "Enter your password" name = "password" required></br>
    <input type = "submit" value = "login">
      <fieldset class="form-group">
          <legend class="border-bottom mb-4" style="color: white;">התחבר עכשיו</legend>
      </fieldset>
      <div class="form-group" id="signup-button">
          <button class="btn ">התחברות</button>
      </div>
      <div class="form-group">
          <small class="text-muted ml-3" >עדיין לא נרשמת? <a href="{% url 'register' %}">הרשמה</a></small>
      </div>
    </form>
    </div>
{% endblock %}
